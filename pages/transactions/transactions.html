<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Log</title>

    <link rel="stylesheet" href="transactions.css">
</head>
<body>

<div class="transactions-page">

    <!-- Header -->
    <div class="page-header">

        <div>
            <h1>Transaction Log</h1>
            <p>Manage all income and expense transactions.</p>
        </div>

        <button id="addTransactionBtn" class="btn btn-primary">
            + Add Transaction
        </button>

    </div>

    <!-- Toolbar -->

    <div class="toolbar">

        <input
            type="text"
            id="searchInput"
            placeholder="Search transaction..."
        >

        <select id="filterType">
            <option value="All">All Types</option>
            <option>Income</option>
            <option>Expense</option>
        </select>

    </div>

    <!-- Table -->

    <div class="table-container">

        <table id="transactionTable">

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Date</th>
                    <th>Type</th>
                    <th>Category</th>
                    <th>Account</th>
                    <th>Amount</th>
                    <th>Tax</th>
                    <th>Description</th>
                    <th>Actions</th>

                </tr>

            </thead>

            <tbody id="transactionBody">

                <!-- JavaScript inserts rows here -->

            </tbody>

        </table>

    </div>

</div>

<!-- ===================================== -->
<!-- Add/Edit Modal -->
<!-- ===================================== -->

<div class="modal hidden" id="transactionModal">

    <div class="modal-content">

        <div class="modal-header">

            <h2 id="modalTitle">
                Add Transaction
            </h2>

            <button id="closeModal">
                ✕
            </button>

        </div>

        <form id="transactionForm">

            <div class="form-grid">

                <div class="form-group">
                    <label>Date</label>

                    <input
                        type="date"
                        id="date"
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Type</label>

                    <select id="type">

                        <option>Income</option>
                        <option>Expense</option>

                    </select>

                </div>

                <div class="form-group">
                    <label>Category</label>

                    <input
                        type="text"
                        id="category"
                        placeholder="Example: Salary"
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Account</label>

                    <input
                        type="text"
                        id="account"
                        placeholder="Example: Cash"
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Amount</label>

                    <input
                        type="number"
                        id="amount"
                        min="0"
                        step="0.01"
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Tax Type</label>

                    <select id="taxType">

                        <option>None</option>
                        <option>Percentage</option>
                        <option>Fixed</option>

                    </select>

                </div>

                <div class="form-group">
                    <label>Additional Tax</label>

                    <input
                        type="text"
                        id="additionalTax"
                        placeholder="Optional"
                    >
                </div>

                <div class="form-group">
                    <label>Additional Tax Amount</label>

                    <input
                        type="number"
                        id="additionalTaxAmount"
                        value="0"
                        min="0"
                    >
                </div>

            </div>

            <div class="form-group">

                <label>Description</label>

                <textarea
                    id="description"
                    rows="4"
                    placeholder="Description..."
                ></textarea>

            </div>

            <div class="modal-footer">

                <button
                    type="button"
                    id="cancelBtn"
                    class="btn"
                >
                    Cancel
                </button>

                <button
                    type="submit"
                    class="btn btn-primary"
                >
                    Save Transaction
                </button>

            </div>

        </form>

    </div>

</div>

<script src="transactions.js"></script>

</body>
</html>
